{% extends "MainPage.html" %}
{% load static %}
{% block title %}
    Hello {{ request.user.first_name }}
{% endblock %}
{% block address %}
<li class="breadcrumb-item"><a href="/"><i class="feather icon-home"></i></a></li>
<li class="breadcrumb-item"><a href="{% url 'school:main' %}">School</a></li>
<li class="breadcrumb-item"><a href="{% url 'school:select_to_add' %}">Add</a></li>
<li class="breadcrumb-item"><a href="javascript:">Module</a></li>
{% endblock %}
{% block content %}
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header">
                    <h5 class="text-center" style="font-family:sans-serif;">Add Module</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="id_exam_number">Exam No #</label>
                            <input class="form-control" type="text" name="exam_number" maxlength="250" required="" id="id_module" value="{{ form.exam_number.value }}">
                        </div>
                        <div class="form-group">
                            <label for="id_class_name">Class Name</label>
                            <select class="form-control" name="class_name" required="" id="id_class_name">
                                {% for i in form.class_name %}
                                    {{ i }}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="id_subject">Subject</label>
                            <select class="form-control" name="subject" required="" id="id_subject">
                                {% for i in form.subject %}
                                    {{ i }}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="id_session">Session</label>
                            <select class="form-control" name="session" required="" id="id_session">
                                {% for i in form.session %}
                                    {{ i }}
                                {% endfor %}
                            </select>
                        </div>
                        <button class="btn btn-primary form-control" >Add</button>
                        {% csrf_token %}
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
