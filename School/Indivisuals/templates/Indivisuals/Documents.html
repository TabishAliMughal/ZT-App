{% extends "MainPage.html" %}
{% load static %}
{% block title %}
    Hello {{ request.user.first_name }}
{% endblock %}
{% block content %}
{% csrf_token %}
    <div class="container">
        <h2 class="text-center" style="font-family:sans-serif;">All Documents</h2><hr/>
        <br>
        <div class="table-responsive">
                        <table  class="table table-hover">
            <tbody class="text-center">
                {% for i in images %}
                    <tr>
                        <td>
                            <div style="text-align: left;position:absolute;">
                                <a style="width: 75px;" class="btn btn-primary" href="#" onClick="zoomOut('{{i}}')" >-</a>
                            </div>
                            <div style="text-align: right;">
                                <a style="width: 75px;" class="btn btn-primary" href="#" onClick="zoomIn('{{i}}')" >+</a>
                            </div>
                        </td>
                    </tr>
                    <tr>
                        <td><img id='{{i}}' style="width: 50%;" class="text-center" class="img" src="{{ i.image.url }}"></td>
                    </tr>
                {% endfor %}
            </tbody>
        </table>
</div>
    </div>
    <script type="text/javascript">
        function zoomIn(x) {
            var img = document.getElementById(x);
            img.style.width = (img.clientWidth + 30) ;
        }
        function zoomOut(x) {
            var img = document.getElementById(x);
            img.style.width = (img.clientWidth - 30) ;
        }
    </script>
{% endblock %}
