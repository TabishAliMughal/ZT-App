{% extends "MainPage.html" %}
{% load static %}
{% block title %}
    Hello {{ individual }}
{% endblock %}
{% block address %}
  <li class="breadcrumb-item"><a href="/"><i class="feather icon-home"></i></a></li>
  <li class="breadcrumb-item"><a href="{% url 'school:main' %}">School</a></li>
  <li class="breadcrumb-item"><a href="javascript:">Student</a></li>
  <li class="breadcrumb-item"><a href="javascript:">Profile</a></li>
{% endblock %}
{% block content %}
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header">
                    <h5>Edit Indivisual</h5>
                </div>
                <div class="card-body">
                    <form method="POST">
                        <div class="form-group">
                            <label for="id_name">Name</label>
                            <input class="form-control" type="text" name="name" maxlength="50" required="" id="id_name" value="{{ form.name.value }}">
                        </div>
                        <div class="form-group">
                            <label for="id_name">Father Name</label>
                            <input class="form-control" type="text" name="father_name" maxlength="50" required="" id="id_father_name" value="{{ form.father_name.value }}">
                        </div>
                        <div class="form-group">
                            <label for="id_name">School</label>
                            <select class="form-control" name="school" id="id_school">
                                {% for i in form.school %}
                                    {{ i }}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="id_name">Sarting</label>
                            <input class="form-control" readonly type="date" name="start_date" value="{{ date }}" required="" id="id_start_date" >
                        </div>
                        <div class="form-group">
                            <label for="id_name">Mobile</label>
                            <input class="form-control" type="text" name="mobile" maxlength="50" required="" id="id_mobile" value="{{ form.mobile.value }}">
                        </div>
                        <div class="form-group">
                            <label for="id_name">Class</label>
                            <select class="form-control" name="clas" required="" id="id_clas">
                                {% for i in form.clas %}
                                    {{ i }}
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="id_name">Fees</label>
                            <input class="form-control" type="number" name="fees" required="" id="id_fees" value="{{ form.fees.value }}">
                        </div>
                        <div class="form-group">
                            <label for="id_name">Active</label>
                            <input class="form-control" type="checkbox" name="active" id="id_active" {% if form.active.value == True %}checked{% endif %}>
                        </div>
                        <button class="btn btn-primary">Add</button>
                        {% csrf_token %}
                    </form>
{% endblock %}
