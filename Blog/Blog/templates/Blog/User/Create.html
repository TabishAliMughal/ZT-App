{% extends "MainPage.html" %}
{% load static %}
{% block title %}
    Hello {{ request.user.first_name }}
{% endblock %}
{% block address %}
    <li class="breadcrumb-item"><a href="/"><i class="feather icon-home"></i></a></li>
    <li class="breadcrumb-item"><a href="{% url 'blog_blog:blog_list' %}">Blogs</a></li>
    <li class="breadcrumb-item"><a href="javascript:">Blog</a></li>
    <li class="breadcrumb-item"><a href="javascript:">Create</a></li>
{% endblock %}
{% block content %}
    <div class="row">
        <div class="col-sm-12">
            <div class="card">
                <div class="card-header">
                    <h5>Create Blog</h5>
                </div>
                <div class="card-body">
                    <form method="POST" enctype="multipart/form-data">
                        <form method="POST" enctype="multipart/form-data">
                            <div class="form-group">
                                <label for="id_height">Name</label>
                                <input class="form-control" type="text" name="name" maxlength="50" required="" id="id_name">
                            </div>
                            <div class="form-group">
                                <label for="id_height">Description</label>
                                <textarea class="form-control" name="description" maxlength="500" id="id_description"></textarea>
                            </div>
                            <div class="form-group">
                                <label for="id_height">Image</label>
                                <input class="form-control" type="file" name="image" accept="image/*" id="id_image">
                            </div>
                            <div class="form-group">
                                <label for="id_height">Type</label>
                                <select name="type" class="form-control" >
                                    {% for i in form.type %}
                                        {{ i }}
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="submit" class="btn btn-primary">Add</button>
                            {% csrf_token %}
                        </form>
                        {% csrf_token %}
                    </form>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
