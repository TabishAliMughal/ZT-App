{% extends "MainPage.html" %}
{% load static %}
{% block title %}
    Hello {{ request.user.username }}
{% endblock %}
{% block content %}
    <form action="{% url 'shop:units_add' %}" method="POST">
        <div class="table-responsive">
                        <table  class="table table-hover">
            <tbody class="text-center">
                <tr>
                    <td>Name</td>
                    <td>{{ form.name }}</td>
                </tr>
                <tr>
                    <td>Action</td>
                    <td><input type="submit" value="Add"></td>
                </tr>
            </tbody>
        </table>
</div>
        {% csrf_token %}
    </form>
{% endblock %}
