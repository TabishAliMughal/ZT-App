{% extends "MainPage.html" %}
{% load static %}
{% block title %}
    Hello {{ request.user.first_name }}
{% endblock %}
{% block content %}
    <div class="table-responsive">
                        <table  class="table table-hover">
        <thead class="text-center">
            <tr>
                <th>Name</th>
                <th>Time</th>
                <th>Status</th>
            </tr>
        </thead>
        <tbody class="text-center">
            {% for i in persons %}
                <td>{{ i.name }}</td>
                <td>{{ i.start_time }} To {{ i.end_time }}</td>
                <td>{{ i.active }}</td>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
