{% extends "MainPage.html" %}
{% load static %}
{% block title %}
    Hello {{ request.user.username }}
{% endblock %}
{% block content %}
    <form method="POST" enctype="multipart/form-data">
        <div class="table-responsive">
                        <table  class="table table-hover">
            <tbody class="text-center">
                <tr>
                    <td>First Name</td>
                    <td>{{ form.name }}</td>
                </tr>
                <tr>
                    <td>Start Time{{ person.start_time }}</td>
                    <td><input type="time" value="{{ stime }}" name="start_time" required /></td>
                </tr>
                <tr>
                    <td>End Time{{ person.end_time }}</td>
                    <td><input type="time" value="{{ etime }}" name="end_time" required /></td>
                </tr>
                <tr>
                    <td>Action</td>
                    <td><input type="submit" value="Save"></td>
                </tr>
            </tbody>
        </table>
</div>
        {% csrf_token %}
    </form>
{% endblock %}
